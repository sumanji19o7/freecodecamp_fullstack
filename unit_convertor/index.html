<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href="style.css">
</head>
<body>

    <div id="upper">
        <h1 id="mainheading">Metric/Imperial Unit conversion</h1>
        <input type="number" id="numberinput"><br>
        <button id="convertbtn">Convert</button>
    </div>
    <div id="lower" >
        <div id="lengthconvert" class="container">
            <h3>Length (Metre/Feet)</h3>
            <p id="lengthstring"></p>
            
        </div>
        <div id="volumeconvert" class="container">
            <h3>Volume(Litres/Gallon)</h3>
            <p id="volumestring"></p>
        </div>
        <div id="massconvert" class="container">
            <h3>Mass(Kilograms/Pounds)</h3>
            <p id="massstring"></p>
        </div>
    </div>



    
    <script src="index.js"></script>
</body>
</html>
